# ╔══════════════════════════════════════════════════════════╗
# ║        🌸 Blossom Flower Shop — Docker Compose           ║
# ╠══════════════════════════════════════════════════════════╣
# ║  Services:                                               ║
# ║    db    → PostgreSQL 15        (port 5432)              ║
# ║    api   → Node.js / Express    (port 5000)              ║
# ║    web   → Next.js 14           (port 3000)              ║
# ║    seed  → One-time DB seeder   (exits after run)        ║
# ╠══════════════════════════════════════════════════════════╣
# ║  Quick Commands:                                         ║
# ║                                                          ║
# ║  Start (first time):                                     ║
# ║    docker compose up --build                             ║
# ║                                                          ║
# ║  Start + seed database:                                  ║
# ║    docker compose --profile seed up --build              ║
# ║                                                          ║
# ║  Run in background:                                      ║
# ║    docker compose up -d                                  ║
# ║                                                          ║
# ║  Stop all:                                               ║
# ║    docker compose down                                   ║
# ║                                                          ║
# ║  Reset database (delete all data):                       ║
# ║    docker compose down -v                                ║
# ║                                                          ║
# ║  View logs:                                              ║
# ║    docker compose logs -f api                            ║
# ║    docker compose logs -f web                            ║
# ║                                                          ║
# ║  Open DB shell:                                          ║
# ║    docker compose exec db psql -U postgres flower_shop   ║
# ╚══════════════════════════════════════════════════════════╝

services:

  # ─────────────────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: flower_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flower_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flower_shop"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - flower_net

  # ─────────────────────────────────────────────────────────
  # Express REST API
  # ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: flower-shop-api:latest
    container_name: flower_shop_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/flower_shop
      JWT_SECRET: super-secret-jwt-key-flower-shop-2026
      JWT_EXPIRES_IN: 7d
      # Cloudinary — image CDN storage
      CLOUDINARY_CLOUD_NAME: "iedhaa6l"
      CLOUDINARY_API_KEY: "611616153163134"
      CLOUDINARY_API_SECRET: "t2RoGG0UnpD_7dLwDQxvn94G1UE"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flower_net

  # ─────────────────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    image: flower-shop-web:latest
    container_name: flower_shop_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - flower_net

  # ─────────────────────────────────────────────────────────
  # Database Seeder (optional — run with --profile seed)
  # Usage: docker compose --profile seed up seed
  # ─────────────────────────────────────────────────────────
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: packages/database/Dockerfile.seed
    image: flower-shop-seed:latest
    container_name: flower_shop_seed
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/flower_shop
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - flower_net

# ─── Networks ──────────────────────────────────────────────
networks:
  flower_net:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
